# Server Configuration
server.port=5000

# PostgreSQL Database Configuration (REPLACE THIS SECTION)
spring.datasource.url=jdbc:postgresql://localhost:5432/car_dealership
spring.datasource.username=car_user
spring.datasource.password=car123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2024CarDealership!
jwt.expiration=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.Shubham.carDealership=DEBUG
logging.level.org.hibernate.SQL=DEBUG